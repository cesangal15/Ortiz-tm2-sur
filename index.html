<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Reporte de Obra — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f1117;--surface:#1a1d27;--border:#2e3450;--accent:#f5a623;--accent2:#e8621a;--text:#e8eaf0;--muted:#7a80a0;--error:#e74c3c;--input-bg:#12151f; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:400px;}
  .logo{text-align:center;margin-bottom:32px;}
  .logo-icon{font-size:48px;margin-bottom:12px;}
  .logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);}
  .logo p{font-size:13px;color:var(--muted);margin-top:4px;}
  .field{margin-bottom:16px;}
  label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;}
  input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 14px;outline:none;transition:border-color 0.2s;}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,0.1);}
  .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#0f1117;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:8px;transition:all 0.2s;}
  .btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,0.3);}
  .error{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--error);margin-top:12px;display:none;}
  .error.visible{display:block;}
  .divider{height:1px;background:var(--border);margin:24px 0;}
  .version{text-align:center;font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🚜</div>
    <h1>Reporte de Obra</h1>
    <p>Ingresa tus credenciales para continuar</p>
  </div>
  <div class="field">
    <label>Usuario</label>
    <input type="text" id="usuario" placeholder="tu usuario" autocomplete="username">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="clave" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
  </div>
  <button class="btn" onclick="login()">INGRESAR →</button>
  <div class="error" id="errorMsg">Usuario o contraseña incorrectos</div>
  <div class="divider"></div>
  <div class="version">Sistema de Reporte v2.0</div>
</div>
<script>
const USUARIOS = {
  'admin':       { clave: 'venganza753', rol: 'admin',       redirige: 'menu.html' },
  'encargado':   { clave: 'enc1-2', rol: 'encargado',  redirige: 'encargado.html' },
  'albert':      { clave: 'capataz2025',  rol: 'capataz',    redirige: 'reporte-capataz.html' },
  'ariel':       { clave: 'capataz2025',  rol: 'capataz',    redirige: 'reporte-capataz.html' },
  'angel':       { clave: 'capataz2025',  rol: 'capataz',    redirige: 'reporte-capataz.html' },
  'alejo':       { clave: 'capataz2025',  rol: 'capataz',    redirige: 'reporte-capataz.html' },
  'robinson':    { clave: 'capataz2025',  rol: 'capataz',    redirige: 'reporte-capataz.html' },
  // Chequeadoras (claves: comparten una contraseña común; usuario se compara en minúsculas)
  'maleja':   { clave: 'cheq2025', rol: 'chequeadora', redirige: 'reporte-chequeadora.html' },
  'mairy':    { clave: 'cheq2025', rol: 'chequeadora', redirige: 'reporte-chequeadora.html' },
  'maria':    { clave: 'cheq2025', rol: 'chequeadora', redirige: 'reporte-chequeadora.html' },
  'luzdary':  { clave: 'cheq2025', rol: 'chequeadora', redirige: 'reporte-chequeadora.html' },
};

function login() {
  const u = document.getElementById('usuario').value.trim().toLowerCase();
  const c = document.getElementById('clave').value;
  const err = document.getElementById('errorMsg');
  if (USUARIOS[u] && USUARIOS[u].clave === c) {
    sessionStorage.setItem('usuario', u);
    sessionStorage.setItem('rol', USUARIOS[u].rol);
    err.classList.remove('visible');
    window.location.href = USUARIOS[u].redirige;
  } else {
    err.classList.add('visible');
    document.getElementById('clave').value = '';
  }
}
</script>
</body>
</html>
