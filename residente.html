<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — Residente</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--border:#2e3450;--accent:#f5a623;--accent2:#e8621a;--text:#e8eaf0;--muted:#7a80a0;--error:#e74c3c;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 40px;}
  .header{background:linear-gradient(135deg,#1a1d27 0%,#0f1117 100%);border-bottom:3px solid var(--accent);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;}
  .header-left .label{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
  .header-left h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
  .header-user{font-size:12px;color:var(--muted);text-align:right;}
  .header-user span{display:block;color:var(--accent);font-weight:600;}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 10px;cursor:pointer;margin-top:4px;font-family:'DM Sans',sans-serif;}
  .logout-btn:hover{border-color:var(--error);color:var(--error);}
  .container{max-width:560px;margin:0 auto;padding:28px 16px;}
  .intro{color:var(--muted);font-size:13px;margin-bottom:20px;}
  .group-label{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:20px 0 10px;}
  .tile{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;cursor:pointer;text-decoration:none;color:var(--text);transition:all 0.2s;}
  .tile:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,0.12);}
  .tile.disabled{cursor:not-allowed;opacity:0.55;}
  .tile.disabled:hover{border-color:var(--border);transform:none;box-shadow:none;}
  .tile .ico{font-size:34px;}
  .tile .t-main h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
  .tile .t-main p{font-size:12px;color:var(--muted);margin-top:3px;}
  .tile .arrow{margin-left:auto;color:var(--accent);font-family:'Syne',sans-serif;font-size:18px;}
  .badge-soon{margin-left:auto;font-family:'Syne',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:3px 8px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="label">Residente</div>
    <h1>🚜 Panel del Residente</h1>
  </div>
  <div class="header-user">
    <span id="userDisplay">—</span>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
</div>
<div class="container">
  <p class="intro">Elige a dónde quieres ir:</p>

  <div class="group-label">Operación</div>
  <a class="tile" href="encargado.html">
    <div class="ico">🗂️</div>
    <div class="t-main"><h2>Panel del Encargado</h2><p>Bandeja del día, totales, envío a DATA y WhatsApp</p></div>
    <div class="arrow">→</div>
  </a>

  <div class="group-label">Consolidado</div>
  <div class="tile disabled">
    <div class="ico">📈</div>
    <div class="t-main"><h2>Resumen General</h2><p>Resumen del reporte una vez enviado a DATA</p></div>
    <div class="badge-soon">Próximamente</div>
  </div>
</div>
<script>
  const rol=sessionStorage.getItem('rol');
  if(!rol || (rol!=='residente' && rol!=='admin')){ window.location.href='index.html'; }
  document.getElementById('userDisplay').textContent=sessionStorage.getItem('usuario')||'residente';
  function logout(){ sessionStorage.clear(); window.location.href='index.html'; }
</script>
</body>
</html>
